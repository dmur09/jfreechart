name: JFreeChart Part 4 CI

on:
  push:
    branches: [ "master" ] # when pushing to master branch
  pull_request:
    branches: [ "master" ] # when merging into master branch
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest # use ubuntu vm to run CI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # pulls my JFreeChart repo so ubuntu has context

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # installs correct java version for use
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Run Tests
        run: mvn --batch-mode clean verify -Djava.awt.headless=true

      - name: Upload Test Report
        if: always() # Run this even if tests fail
        uses: actions/upload-artifact@v4 # becuase ubuntu vm is destroyed, save test results
        with:
          name: junit-test-results
          path: '**/target/surefire-reports/*.xml' # save this